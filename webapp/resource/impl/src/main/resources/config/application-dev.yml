application:
  on-start:
    resources:
      rights: classpath:dev/fake-data/rights.json
      roles: classpath:dev/fake-data/roles.json
      users: classpath:dev/fake-data/users.json
      users-securities: classpath:dev/fake-data/users-securities.json
      ingredients: classpath:dev/fake-data/ingredients.json
      clients-orders: classpath:dev/fake-data/clients-orders.json
  web-client:
    common:
      connect-timeout: 5s
      response-timeout: 5s
      read-timeout: 5s
      write-timeout: 5s
  taco:
    orders:
      page-size: 20
      sub-samples:
        test-it: exact-match
    ingredients:
      external-resource:
        scheduler:
          initial-delay: 5000
          fixed-delay: 30000
          enable: true
        base-url: 'http://localhost:8080/api/v1'
  password:
    default-encoder: bcrypt
    encoders:
      bcrypt:
        org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder
  pagination:
    page-size: 10