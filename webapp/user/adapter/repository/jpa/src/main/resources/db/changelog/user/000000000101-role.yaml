databaseChangeLog:
  - changeSet:
      id: role-app
      author: cm

      changes:
        - createTable:
            tableName: role_app
            columns:
              - column:
                  name: id
                  type: BINARY(16)
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)