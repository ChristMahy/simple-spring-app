databaseChangeLog:
  - changeSet:
      id: role-right-link
      author: cm

      changes:
        - createTable:
            tableName: role_right_app
            columns:
              - column:
                  name: role_app_id
                  type: BINARY(16)
                  constraints:
                    nullable: false

              - column:
                  name: right_app_id
                  type: BINARY(16)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: role_right_app
            columnNames: role_app_id, right_app_id

        - addForeignKeyConstraint:
            constraintName: fk_role_right_app_role
            baseTableName: role_right_app
            baseColumnNames: role_app_id
            referencedTableName: role_app
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_role_right_app_right
            baseTableName: role_right_app
            baseColumnNames: right_app_id
            referencedTableName: right_app
            referencedColumnNames: id