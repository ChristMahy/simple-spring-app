databaseChangeLog:
  - changeSet:
      id: taco-ingredients
      author: cm

      changes:
        - createTable:
            tableName: taco_ingredients
            columns:

              - column:
                  name: ingredients_id
                  type: BINARY(16)
                  constraints:
                    nullable: false

              - column:
                  name: taco_id
                  type: BINARY(16)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            constraintName: u_taco_ingredients
            tableName: taco_ingredients
            columnNames: ingredients_id, taco_id

        - addForeignKeyConstraint:
            constraintName: fk_taco_ingredients_taco
            baseTableName: taco_ingredients
            baseColumnNames: taco_id
            referencedTableName: taco
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_taco_ingredients_ingredient
            baseTableName: taco_ingredients
            baseColumnNames: ingredients_id
            referencedTableName: ingredient
            referencedColumnNames: id